<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="skyGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#1E1B4B"/>
    </radialGradient>
    <linearGradient id="landGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#15803D"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="50%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <clipPath id="circleClip">
      <circle cx="100" cy="100" r="85"/>
    </clipPath>
    <filter id="cloudBlur">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
    <filter id="planeGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer decorative ring -->
  <circle cx="100" cy="100" r="97" fill="none" stroke="url(#ringGrad)" stroke-width="2.5" opacity="0.5" stroke-dasharray="6 3"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="url(#ringGrad)" stroke-width="1" opacity="0.3"/>

  <!-- Main background circle -->
  <circle cx="100" cy="100" r="88" fill="#1E1B4B"/>

  <g clip-path="url(#circleClip)">
    <!-- Sky -->
    <rect x="15" y="15" width="170" height="170" fill="url(#skyGrad)"/>

    <!-- Stars -->
    <circle cx="40" cy="35" r="1.5" fill="white" opacity="0.9"/>
    <circle cx="65" cy="28" r="1" fill="white" opacity="0.7"/>
    <circle cx="90" cy="22" r="1.5" fill="white" opacity="0.8"/>
    <circle cx="130" cy="30" r="1" fill="white" opacity="0.6"/>
    <circle cx="155" cy="38" r="1.5" fill="white" opacity="0.9"/>
    <circle cx="170" cy="25" r="1" fill="white" opacity="0.7"/>
    <circle cx="25" cy="55" r="1" fill="white" opacity="0.5"/>
    <circle cx="148" cy="55" r="1" fill="white" opacity="0.6"/>

    <!-- Cloud left -->
    <g filter="url(#cloudBlur)" opacity="0.85">
      <ellipse cx="38" cy="80" rx="18" ry="9" fill="white"/>
      <ellipse cx="50" cy="75" rx="14" ry="10" fill="white"/>
      <ellipse cx="28" cy="82" rx="12" ry="7" fill="white"/>
    </g>

    <!-- Cloud right -->
    <g filter="url(#cloudBlur)" opacity="0.7">
      <ellipse cx="158" cy="72" rx="16" ry="8" fill="white"/>
      <ellipse cx="168" cy="67" rx="12" ry="9" fill="white"/>
      <ellipse cx="148" cy="74" rx="10" ry="6" fill="white"/>
    </g>

    <!-- Land -->
    <path d="M15,145 Q40,125 65,138 Q90,150 115,132 Q140,115 165,130 Q180,138 185,145 L185,185 L15,185 Z" fill="url(#landGrad)"/>
    <path d="M15,145 Q40,125 65,138 Q90,150 115,132 Q140,115 165,130 Q180,138 185,145" fill="none" stroke="#4ADE80" stroke-width="1.5" opacity="0.6"/>

    <!-- Road -->
    <path d="M70,185 Q90,165 100,155 Q110,165 130,185" fill="none" stroke="#A3E635" stroke-width="2" stroke-dasharray="4 3" opacity="0.5"/>

    <!-- Destination pin -->
    <g transform="translate(100,148)">
      <path d="M0,-14 C-7,-14 -12,-9 -12,-3 C-12,5 0,16 0,16 C0,16 12,5 12,-3 C12,-9 7,-14 0,-14 Z" fill="#F97316"/>
      <circle cx="0" cy="-3" r="4.5" fill="white"/>
      <circle cx="0" cy="-3" r="2" fill="#F97316"/>
      <circle cx="0" cy="16" r="5" fill="#F97316" opacity="0.2"/>
      <circle cx="0" cy="16" r="3" fill="#F97316" opacity="0.15"/>
    </g>

    <!-- Origin pin -->
    <g transform="translate(52,118)">
      <path d="M0,-10 C-5,-10 -8,-6 -8,-2 C-8,4 0,12 0,12 C0,12 8,4 8,-2 C8,-6 5,-10 0,-10 Z" fill="#FBBF24"/>
      <circle cx="0" cy="-2" r="3.5" fill="white"/>
      <circle cx="0" cy="-2" r="1.5" fill="#FBBF24"/>
    </g>

    <!-- Dashed travel path -->
    <path d="M52,108 Q72,80 100,72 Q128,64 148,110" fill="none" stroke="white" stroke-width="1.2" stroke-dasharray="4 3" opacity="0.55"/>

    <!-- Airplane -->
    <g transform="translate(100,78) rotate(-30)">
      <g filter="url(#planeGlow)">
        <ellipse cx="0" cy="0" rx="18" ry="6" fill="white"/>
        <path d="M18,0 L26,-2 L26,2 Z" fill="white"/>
        <path d="M-2,-6 L-14,-18 L4,-6 Z" fill="white" opacity="0.95"/>
        <path d="M-2,6 L-14,18 L4,6 Z" fill="white" opacity="0.95"/>
        <path d="M-18,0 L-24,-8 L-16,-4 Z" fill="white" opacity="0.9"/>
        <path d="M-18,0 L-24,8 L-16,4 Z" fill="white" opacity="0.9"/>
        <circle cx="4" cy="0" r="2.5" fill="#0EA5E9" opacity="0.8"/>
        <circle cx="-4" cy="0" r="2" fill="#0EA5E9" opacity="0.6"/>
      </g>
    </g>
  </g>

  <!-- Inner border -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="white" stroke-width="1.5" opacity="0.15"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="url(#ringGrad)" stroke-width="3"/>
</svg>
